name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Version
        id: version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Get joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "JOKE=$JOKE" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          echo "## Latest Release Info" > temp.md
          echo "- Version: ${{ steps.version.outputs.VERSION }}" >> temp.md
          echo "- PR Title: ${{ github.event.head_commit.message }}" >> temp.md
          echo "- Chuck Norris Joke: ${{ steps.joke.outputs.JOKE }}" >> temp.md
          cat README.md >> temp.md
          mv temp.md README.md

      - name: Commit README
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update readme" || echo "no changes"
          git push

      - name: Create Tag
        run: |
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.joke.outputs.JOKE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
